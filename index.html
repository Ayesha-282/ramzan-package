<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ramazan Package</title>

<style>

body{
font-family:Arial;
background:#edf0f1;
text-align:center;
padding:30px;
}

.card{
background:white;
max-width:450px;
margin:auto;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:12px;
font-size:16px;
margin-top:10px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#0a5d0a;
color:white;
border:none;
font-size:16px;
}

.result{
margin-top:15px;
}

</style>
</head>

<body>

<div class="card">

<h2>Ramazan Package</h2>

<input id="searchBox" placeholder="Enter CNIC or Mobile">

<button onclick="search()">SEARCH STATUS</button>

<div id="result" class="result"></div>

</div>

<script>

function search(){

var value=document.getElementById("searchBox").value;

fetch("https://script.google.com/macros/s/AKfycbzA0U1dZPFj2T_aE3gWlvPXPhB-t5JjjFCp0QO8OaKuiCy4BA6jUnBw5RLvxycI2VD5/exec?q="+value)

.then(res=>res.json())
.then(data=>{

if(data==null){

document.getElementById("result").innerHTML="Not registered";

}else{

document.getElementById("result").innerHTML=
"Name: "+data.name+"<br>"+
"CNIC: "+data.cnic+"<br>"+
"Mobile: "+data.mobile;

}

})

}

</script>

</body>
</html>
