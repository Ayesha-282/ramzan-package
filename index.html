<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ramazan Package - District Upper Dir</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="format-detection" content="telephone=no">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #edf0f1;
            font-family: Arial, sans-serif;
        }
        
        .container {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #edf0f1;
            -webkit-overflow-scrolling: touch;
            overflow-y: auto;
        }
        
        /* iOS specific fixes */
        @supports (-webkit-overflow-scrolling: touch) {
            iframe {
                height: 100%;
                width: 100%;
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
            }
        }
        
        /* Loading indicator */
        .loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #0a5d0a;
            z-index: 1000;
        }
        
        .loader.hidden {
            display: none;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            margin: 10px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0a5d0a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Error message */
        .error-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 300px;
            display: none;
            z-index: 2000;
        }
        
        .error-message.show {
            display: block;
        }
        
        .error-message a {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #0a5d0a;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        
        /* Help text for mobile */
        .mobile-help {
            position: fixed;
            bottom: 10px;
            left: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px;
            border-radius: 20px;
            font-size: 12px;
            color: #666;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: none;
            z-index: 1500;
        }
        
        @media (max-width: 768px) {
            .mobile-help {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Loading indicator -->
        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>
        
        <!-- Error message -->
        <div class="error-message" id="errorMessage">
            <h3 style="color: #b30000;">⚠️ Connection Error</h3>
            <p>Having trouble loading the application. Please try:</p>
            <button onclick="reloadIframe()" style="background:#0a5d0a; color:white; border:none; padding:10px 20px; border-radius:5px; margin:5px;">Reload</button>
            <a href="https://script.google.com/macros/s/AKfycbzA0U1dZPFj2T_aE3gWlvPXPhB-t5JjjFCp0QO8OaKuiCy4BA6jUnBw5RLvxycI2VD5/exec">Open Directly</a>
        </div>
        
        <!-- Mobile help text -->
        <div class="mobile-help" id="mobileHelp">
            👆 Tap here to type | If keyboard doesn't appear, tap the search box twice
        </div>
        
        <!-- Iframe with proper attributes -->
        <iframe 
            id="mainIframe"
            src="https://script.google.com/macros/s/AKfycbzA0U1dZPFj2T_aE3gWlvPXPhB-t5JjjFCp0QO8OaKuiCy4BA6jUnBw5RLvxycI2VD5/exec"
            sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-top-navigation"
            allow="geolocation; microphone; camera; autoplay; fullscreen"
            importance="high"
            onload="hideLoader()"
            onerror="showError()"
        ></iframe>
    </div>

    <script>
        // Hide loader when iframe loads
        function hideLoader() {
            document.getElementById('loader').classList.add('hidden');
        }
        
        // Show error message if iframe fails to load
        function showError() {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('errorMessage').classList.add('show');
        }
        
        // Reload iframe function
        function reloadIframe() {
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('loader').classList.remove('hidden');
            
            var iframe = document.getElementById('mainIframe');
            iframe.src = iframe.src; // Reload iframe
        }
        
        // Mobile-specific fixes
        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            
            // Fix for iOS iframe input issues
            if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                document.addEventListener('touchstart', function() {
                    // This helps activate touch events
                }, {passive: true});
                
                // Force iframe to be interactive
                var iframe = document.getElementById('mainIframe');
                iframe.setAttribute('webkitallowfullscreen', 'true');
                
                // Prevent zoom on input focus
                var lastTouchEnd = 0;
                document.addEventListener('touchend', function (event) {
                    var now = (new Date()).getTime();
                    if (now - lastTouchEnd <= 300) {
                        event.preventDefault();
                    }
                    lastTouchEnd = now;
                }, false);
            }
            
            // Fix for Android
            if (/Android/i.test(navigator.userAgent)) {
                // Ensure iframe gets touch events
                window.addEventListener('touchstart', function() {
                    // Touch activation
                }, {passive: true});
            }
            
            // Additional fix for all mobile devices
            window.addEventListener('load', function() {
                // Add a small delay to ensure everything is loaded
                setTimeout(function() {
                    // Force iframe to handle input events
                    var iframe = document.getElementById('mainIframe');
                    if (iframe) {
                        iframe.style.opacity = '0.99';
                        setTimeout(function() {
                            iframe.style.opacity = '1';
                        }, 10);
                    }
                    
                    // Hide loading
                    hideLoader();
                }, 1000);
            });
            
            // Help users with input issues
            document.addEventListener('click', function(e) {
                // If user clicks anywhere near the search area, show help
                var mobileHelp = document.getElementById('mobileHelp');
                mobileHelp.style.opacity = '0.7';
                setTimeout(function() {
                    mobileHelp.style.opacity = '1';
                }, 200);
            });
        }
        
        // Handle iframe errors
        window.addEventListener('error', function(e) {
            if (e.target.tagName === 'IFRAME') {
                showError();
            }
        }, true);
        
        // Timeout fallback
        setTimeout(function() {
            var loader = document.getElementById('loader');
            if (!loader.classList.contains('hidden')) {
                showError();
            }
        }, 10000); // 10 seconds timeout
    </script>
</body>
</html>
